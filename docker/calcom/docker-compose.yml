services:
  calcom:
    image: calcom/cal.com:latest
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@calcom-db:5432/calcom
      - DATABASE_DIRECT_URL=postgresql://postgres:postgres@calcom-db:5432/calcom
      - NEXTAUTH_SECRET=${CALCOM_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3001
      - CALENDSO_ENCRYPTION_KEY=${CALCOM_ENCRYPTION_KEY}
      - NEXT_PUBLIC_WEBAPP_URL=http://localhost:3001
      - NEXT_PUBLIC_LICENSE_CONSENT=agree
      - CALCOM_LICENSE_KEY=
      - NODE_ENV=development
    depends_on:
      calcom-db:
        condition: service_healthy
    restart: unless-stopped

  calcom-db:
    image: postgres:15
    environment:
      - POSTGRES_DB=calcom
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - calcom_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calcom"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  calcom_data:
